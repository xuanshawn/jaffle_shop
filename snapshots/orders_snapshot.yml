snapshots:
  - name: orders_snapshot
    relation: source('ecom', 'raw_orders')
    config:
    # set the schema and database for the snapshot table
      schema: snapshots
      # database: jaffle_shop_raw
      unique_key: id
      strategy: check
      check_cols: ['id', 'customer', 'ordered_at']
      dbt_valid_to_current: NULL #If not mentioned, this column will not be created.
      snapshot_meta_column_names: 
        dbt_valid_from: start_date
        dbt_valid_to: end_date #If not mentioned, the second column will be auto-created.
        dbt_updated_at: modified_date


      
