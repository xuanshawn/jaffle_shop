unit_tests:
  - name: test_orders_status_clean_up
    description: test my status case when logic.
    model: stg_orders
    given:
      - input: source('jaffle_shop', 'orders')
        rows:
          - {id: 1, STATUS: 'returned'}
          - {id: 2, STATUS: 'return pending'}
          - {id: 3, STATUS: 'completed'}
          - {id: 4, STATUS: 'pending'}
          - {id: 5, STATUS: 'shipped'}
          - {id: 6, STATUS: 'Placed'}
    expect:
      rows:
        - {order_id: 1, status: 'returned'}
        - {order_id: 2, status: 'returned'}
        - {order_id: 3, status: 'completed'}
        - {order_id: 4, status: 'placed'}
        - {order_id: 5, status: 'shipped'}
        - {order_id: 6, status: 'placed'}

  - name: test_days_since_ordered
    description: Test my datediff caluclation for days_since_ordered
    model: stg_orders
    overrides:
      vars:
        current_date(): date('2026-01-15')
    given:
      - input: source('jaffle_shop',  'orders')
        rows:
          - {ID: 1, USER_ID: 10, ORDER_DATE: 2026-01-01, STATUS: 'completed'}
    expect:
      rows:
        - {order_date: 2026-01-01, days_since_ordered: 14}